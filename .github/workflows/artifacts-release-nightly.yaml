name: Artifacts Release Nightly
on:
  pull_request:
  push:
  schedule:
  - cron: '1 0 * * *'  # Nightly build.
jobs:
  detect_changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      conf_gen: ${{ steps.changed.outputs.conf_gen }}
      openwrt_builder: ${{ steps.changed.outputs.openwrt_builder }}
      release: ${{ steps.changed.outputs.release }}
      run_ci: ${{ steps.changed.outputs.run_ci }}
    steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0
    - id: changed
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        conf_gen=false
        openwrt_builder=false
        release=false
        run_ci=true
        case "${{ github.event_name }}" in
          schedule)
            conf_gen=true
            openwrt_builder=true
            release=true
            ;;
          push)
            if [[ "${{ github.ref }}" == "refs/heads/master" ]]; then
              conf_gen=true
              openwrt_builder=true
              release=true
            else
              open_pr_count="$(gh pr list \
                --head "${{ github.ref_name }}" \
                --state open \
                --json number \
                --jq 'length')"
              if [[ "$open_pr_count" == "0" ]]; then
                conf_gen=true
              else
                run_ci=false
              fi
            fi
            ;;
          pull_request)
            base="${{ github.event.pull_request.base.sha }}"
            head="${{ github.event.pull_request.head.sha }}"
            changed_files="$(git diff --name-only "$base...$head")"
            while IFS= read -r file; do
              [[ -n "$file" ]] || continue
              case "$file" in
                conf-gen/*)
                  conf_gen=true
                  ;;
                openwrt-builder/*)
                  openwrt_builder=true
                  ;;
              esac
            done <<< "$changed_files"
            ;;
          *)
            echo "::error::Unsupported event ${{ github.event_name }}"
            exit 1
            ;;
        esac
        {
          echo "conf_gen=$conf_gen"
          echo "openwrt_builder=$openwrt_builder"
          echo "release=$release"
          echo "run_ci=$run_ci"
        } >> "$GITHUB_OUTPUT"

  type_check:
    name: Type Check
    runs-on: ubuntu-latest
    needs: detect_changes
    if: ${{ needs.detect_changes.outputs.run_ci == 'true' }}
    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/setup-uv@v7
      with:
        cache-suffix: type-check
    - run: |
        uv sync --extra dev
        uv run mypy common/src/common conf-gen/src/conf_gen util-cookbook/tencent-cloud/src/tencent_cloud

  conf_gen_tests:
    name: conf-gen Tests
    runs-on: ubuntu-latest
    needs: detect_changes
    if: >-
      ${{
        needs.detect_changes.outputs.run_ci == 'true' &&
        needs.detect_changes.outputs.conf_gen == 'true'
      }}
    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/setup-uv@v7
      with:
        cache-suffix: conf-gen-tests
    - run: |
        uv sync --extra dev
        uv run pytest conf-gen/tests

  build_configuration:
    name: Build Configurations
    runs-on: ubuntu-latest
    needs: detect_changes
    if: >-
      ${{
        needs.detect_changes.outputs.run_ci == 'true' &&
        needs.detect_changes.outputs.conf_gen == 'true'
      }}
    env:
      LINUX_SING_BOX_CHECK_CONFIGS: sing-box-daemon
    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/setup-uv@v7
    - run: uv sync --extra dev
    - id: generate_proxy_conf
      env:
        PASSWORD: ${{ secrets.MASTER_PASSWORD }}
      run: |
        uv run conf-gen -s conf-gen/source.yaml -o artifacts-conf/
        sing_box_check_args=()
        case "$RUNNER_OS" in
          Linux)
            for config in $LINUX_SING_BOX_CHECK_CONFIGS; do
              sing_box_check_args+=(--check-config "$config")
            done
            ;;
        esac
        uv run pytest conf-gen/tests/test_generated_sing_box_artifacts.py \
          --artifact-dir artifacts-conf "${sing_box_check_args[@]}"
        # Encrypt every config in place; .srs rule sets are public domain
        # lists and stay plaintext. Workflow artifacts on a public repo are
        # downloadable by anyone with read access, so we cannot upload the
        # post-secret-expansion configs unencrypted.
        find artifacts-conf -type f ! -name '*.srs' | while IFS= read -r f; do
          gpg -c --batch --yes --passphrase="$PASSWORD" -o "$f.gpg" "$f"
          rm -f "$f"
        done
        uv run python3 - <<- 'EOF' >> "$GITHUB_OUTPUT"
        import yaml
        conf = yaml.safe_load(open("conf-gen/source.yaml"))
        print(f"CONFIG_NAMES={list(g['name'] for g in conf['generates'])}")
        EOF
    - uses: actions/upload-artifact@v6
      with:
        name: artifacts-conf
        path: artifacts-conf/
        retention-days: 7
    outputs:
      config_names: ${{ steps.generate_proxy_conf.outputs.CONFIG_NAMES }}

  build_openwrt:
    name: Build OpenWRT ${{ matrix.version.openwrt }} ${{ matrix.arch.openwrt }}
    runs-on: ubuntu-latest
    needs: [detect_changes, build_configuration]
    if: >-
      ${{
        always() &&
        needs.detect_changes.outputs.run_ci == 'true' &&
        needs.detect_changes.outputs.openwrt_builder == 'true' &&
        needs.build_configuration.result != 'failure' &&
        needs.build_configuration.result != 'cancelled'
      }}
    strategy:
      matrix:
        arch:
        - openwrt: x86/64
          toolchain: x86/64
          package: x86_64
          sing_box: amd64
          artifact: x86_64
          profile: ''
        - openwrt: rockchip/armv8
          toolchain: aarch64
          package: aarch64_generic
          sing_box: arm64
          artifact: rockchip_armv8
          profile: friendlyarm_nanopi-r6s
        version:
        - openwrt: '25.12.3'
          gcc: 14.3.0_musl
          allow_failure: false
        - openwrt: snapshots
          gcc: 14.3.0_musl
          allow_failure: true
    continue-on-error: ${{ matrix.version.allow_failure }}
    steps:
    - uses: actions/checkout@v5
    - uses: astral-sh/setup-uv@v7
    - uses: actions/setup-go@v6
      with:
        go-version: stable
        cache: false
    - uses: actions/download-artifact@v7
      if: ${{ needs.build_configuration.result == 'success' }}
      with:
        name: artifacts-conf
        path: ${{ github.workspace }}/conf
    - name: Decrypt configs needed by build.sh
      if: ${{ needs.build_configuration.result == 'success' }}
      env:
        PASSWORD: ${{ secrets.MASTER_PASSWORD }}
      run: |
        find ${{ github.workspace }}/conf -name '*.gpg' | while IFS= read -r f; do
          gpg -d --batch --yes --passphrase="$PASSWORD" -o "${f%.gpg}" "$f"
          rm -f "$f"
        done
    - name: Download released config needed by build.sh
      if: ${{ needs.build_configuration.result == 'skipped' }}
      env:
        PASSWORD: ${{ secrets.MASTER_PASSWORD }}
      run: |
        conf_dir="${{ github.workspace }}/conf/sing-box-daemon"
        mkdir -p "$conf_dir"
        curl -fsSL \
          https://github.com/lirundong/homelab-infra/releases/download/sing-box-daemon/config.json.gpg \
          -o "$conf_dir/config.json.gpg"
        gpg -d --batch --yes --passphrase="$PASSWORD" \
          -o "$conf_dir/config.json" \
          "$conf_dir/config.json.gpg"
        rm -f "$conf_dir/config.json.gpg"
    - id: run_build_script
      env:
        TARGET_ARCH: ${{ matrix.arch.openwrt }}
        TOOLCHAIN_ARCH: ${{ matrix.arch.toolchain }}
        PACKAGE_ARCH: ${{ matrix.arch.package }}
        HOST_ARCH: x86/64
        VERSION: ${{ matrix.version.openwrt }}
        GCC_VERSION: ${{ matrix.version.gcc }}
        SING_BOX_ARCH: ${{ matrix.arch.sing_box }}
        SING_BOX_CONFIG: ${{ github.workspace }}/conf/sing-box-daemon/config.json
        REPOSITORY: https://downloads.openwrt.org
        WORK_DIR: ${{ github.workspace }}/openwrt
        PASSWORD: ${{ secrets.MASTER_PASSWORD }}
        PROFILE: ${{ matrix.arch.profile }}
      run: |
        if [[ "${{ matrix.version.openwrt }}" == 'snapshots' ]]; then
          VERSION_PREFIX=""
        else
          VERSION_PREFIX="${VERSION}-"
        fi
        BUILD_DIR="${WORK_DIR}/openwrt-imagebuilder-${VERSION_PREFIX}${TARGET_ARCH/\//-}.Linux-${HOST_ARCH/\//_}/bin/targets/${TARGET_ARCH}"
        OUTPUT_DIR="${{ github.workspace }}/outputs"
        mkdir -p "$OUTPUT_DIR"
        bash openwrt-builder/build.sh
        # Encrypt before staging into the artifact upload directory; the .gz
        # contents include the post-secret-expansion rootfs which leaks the
        # master password (it's the on-device cron passphrase) if uploaded raw.
        image_list="$RUNNER_TEMP/openwrt-images"
        find "$BUILD_DIR" -iname '*.gz' -print0 > "$image_list"
        while IFS= read -r -d '' f; do
          gpg -c --batch --yes --passphrase="$PASSWORD" \
            -o "$OUTPUT_DIR/$(basename "$f").gpg" \
            "$f"
        done < "$image_list"
        echo "OUTPUT_DIR=${OUTPUT_DIR}" >> "$GITHUB_OUTPUT"
    - uses: actions/upload-artifact@v6
      with:
        name: openwrt-${{ matrix.version.openwrt }}-${{ matrix.arch.artifact }}-gcc-${{ matrix.version.gcc }}
        path: ${{ steps.run_build_script.outputs.OUTPUT_DIR }}
        retention-days: 7

  ci_gate:
    name: CI Gate
    runs-on: ubuntu-latest
    needs: [detect_changes, type_check, conf_gen_tests, build_configuration, build_openwrt]
    if: >-
      ${{
        always() &&
        (
          needs.detect_changes.result != 'success' ||
          needs.detect_changes.outputs.run_ci == 'true'
        )
      }}
    steps:
    - run: |
        # Single stable check for branch protection. snapshots matrix legs are
        # continue-on-error, so a failure there does not downgrade
        # needs.build_openwrt.result; this gate tracks stable legs only.
        required=(
          "detect_changes=${{ needs.detect_changes.result }}"
          "type_check=${{ needs.type_check.result }}"
        )
        if [[ "${{ needs.detect_changes.outputs.conf_gen }}" == "true" ]]; then
          required+=(
            "conf_gen_tests=${{ needs.conf_gen_tests.result }}"
            "build_configuration=${{ needs.build_configuration.result }}"
          )
        fi
        if [[ "${{ needs.detect_changes.outputs.openwrt_builder }}" == "true" ]]; then
          required+=("build_openwrt=${{ needs.build_openwrt.result }}")
        fi
        failed=
        for r in "${required[@]}"; do
          name=${r%=*}; res=${r#*=}
          if [[ "$res" != "success" ]]; then
            echo "::error::$name => $res"; failed=1
          fi
        done
        [[ -z "$failed" ]]

  release_proxy_configurations:
    name: Release ${{ matrix.conf }} Configuration
    needs: [detect_changes, build_configuration]
    runs-on: ubuntu-latest
    if: >-
      ${{
        needs.detect_changes.outputs.run_ci == 'true' &&
        needs.detect_changes.outputs.release == 'true'
      }}
    strategy:
      matrix:
        conf: ${{ fromJSON(needs.build_configuration.outputs.config_names) }}
    steps:
    - uses: actions/checkout@v5
    - uses: actions/download-artifact@v7
      with:
        name: artifacts-conf
        path: ${{ github.workspace }}/conf
    - run: |
        # Configs are already GPG-encrypted at build_configuration time; just
        # copy them to the release dir alongside the plaintext .srs rule sets.
        # sing-box config directories must always carry .srs rule sets; a
        # missing-glob failure here is the desired signal, not noise to suppress.
        conf_root="${{ github.workspace }}/conf"
        release_dir="${{ github.workspace }}/release"
        mkdir -p "$release_dir"
        if [[ -d "$conf_root/${{ matrix.conf }}" ]]; then
          cp "$conf_root/${{ matrix.conf }}"/*.gpg "$release_dir"/
          cp "$conf_root/${{ matrix.conf }}"/*.srs "$release_dir"/
        else
          conf_file_list="$RUNNER_TEMP/conf-files"
          find "$conf_root" -iname "${{ matrix.conf }}.*.gpg" -print0 > "$conf_file_list"
          if [[ ! -s "$conf_file_list" ]]; then
            echo "::error::No release artifact found for ${{ matrix.conf }}"
            exit 1
          fi
          while IFS= read -r -d '' conf_file; do
            cp "$conf_file" "$release_dir"/
          done < "$conf_file_list"
        fi
    - id: prepare_readme
      run: |
        mkdir artifacts-readme
        cp .github/artifacts-release-readme.md artifacts-readme/README.md
        release_date="$(date +'%Y/%m/%d')"
        sed -i "s!{ARTIFACT_NAME}!${{ matrix.conf }} Configuration!g" artifacts-readme/README.md
        sed -i "s!{RELEASE_DATE}!$release_date!g" artifacts-readme/README.md
        sed -i "s!{CONTENT_DESCRIPTION}!- Configuration file (possibly with companion binaries) for ${{ matrix.conf }}!g" artifacts-readme/README.md
        # Load README content to an env variable, see
        # https://github.com/marketplace/actions/upload-files-to-a-github-release#usage
        RELEASE_README=$(cat artifacts-readme/README.md)
        RELEASE_README="${RELEASE_README//'%'/'%25'}"    # Multiline escape sequences for %
        RELEASE_README="${RELEASE_README//$'\n'/'%0A'}"  # Multiline escape sequences for '\n'
        RELEASE_README="${RELEASE_README//$'\r'/'%0D'}"  # Multiline escape sequences for '\r'
        echo "RELEASE_README=${RELEASE_README}" >> "$GITHUB_OUTPUT"
    - uses: svenstaro/upload-release-action@v2
      with:
        file: ${{ github.workspace }}/release/*
        file_glob: true
        overwrite: true
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: ${{ matrix.conf }}
        release_name: Nightly ${{ matrix.conf }} Configuration Release
        body: |
          ${{ steps.prepare_readme.outputs.RELEASE_README }}

  release_openwrt_builds:
    name: Release OpenWRT ${{ matrix.version.openwrt }} ${{ matrix.arch.openwrt }}
    needs: [detect_changes, build_openwrt]
    runs-on: ubuntu-latest
    if: >-
      ${{
        needs.detect_changes.outputs.run_ci == 'true' &&
        needs.detect_changes.outputs.release == 'true'
      }}
    strategy:
      matrix:
        arch:
        - openwrt: x86/64
          artifact: x86_64
        - openwrt: rockchip/armv8
          artifact: rockchip_armv8
        version:
        - openwrt: '25.12.3'
          gcc: 14.3.0_musl
          allow_failure: false
        - openwrt: snapshots
          gcc: 14.3.0_musl
          allow_failure: true
    continue-on-error: ${{ matrix.version.allow_failure }}
    steps:
    - uses: actions/checkout@v5
    - uses: actions/download-artifact@v7
      with:
        name: openwrt-${{ matrix.version.openwrt }}-${{ matrix.arch.artifact }}-gcc-${{ matrix.version.gcc }}
        path: ${{ github.workspace }}/openwrt
    - run: |
        # Images are already GPG-encrypted at build_openwrt time; just stage
        # the .gpg files for upload to the GitHub Release.
        release_dir="${{ github.workspace }}/release"
        mkdir -p "$release_dir"
        cp "${{ github.workspace }}/openwrt"/*.gpg "$release_dir"/
    - id: prepare_readme
      run: |
        mkdir artifacts-readme
        cp .github/artifacts-release-readme.md artifacts-readme/README.md
        release_date="$(date +'%Y/%m/%d')"
        sed -i "s!{ARTIFACT_NAME}!OpenWRT ${{ matrix.version.openwrt }} ${{ matrix.arch.openwrt }}!g" artifacts-readme/README.md
        sed -i "s!{RELEASE_DATE}!$release_date!g" artifacts-readme/README.md
        sed -i "s!{CONTENT_DESCRIPTION}!- OpenWRT ${{ matrix.version.openwrt }} images built with GCC ${{ matrix.version.gcc }} for the ${{ matrix.arch.openwrt }} platform!g" artifacts-readme/README.md
        # Load README content to an env variable, see
        # https://github.com/marketplace/actions/upload-files-to-a-github-release#usage
        RELEASE_README=$(cat artifacts-readme/README.md)
        RELEASE_README="${RELEASE_README//'%'/'%25'}"    # Multiline escape sequences for %
        RELEASE_README="${RELEASE_README//$'\n'/'%0A'}"  # Multiline escape sequences for '\n'
        RELEASE_README="${RELEASE_README//$'\r'/'%0D'}"  # Multiline escape sequences for '\r'
        echo "RELEASE_README=${RELEASE_README}" >> "$GITHUB_OUTPUT"
    - uses: svenstaro/upload-release-action@v2
      with:
        file: ${{ github.workspace }}/release/*
        file_glob: true
        overwrite: true
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        tag: openwrt_${{ matrix.version.openwrt }}_${{ matrix.arch.openwrt }}
        release_name: Nightly OpenWRT ${{ matrix.version.openwrt }} ${{ matrix.arch.openwrt }} Release
        body: |
          ${{ steps.prepare_readme.outputs.RELEASE_README }}
