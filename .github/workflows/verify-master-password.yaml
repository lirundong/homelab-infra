name: Verify Master Password

# Manually-triggered fingerprint check. Emits the first 16 hex chars of
# sha256(MASTER_PASSWORD), used to confirm the GitHub-side secret matches the
# locally-generated one before rotating secrets.yaml. Safe only if the master
# is high-entropy (e.g. UUID v4). Restricted to the repo owner.

on:
  workflow_dispatch:

permissions: {}

jobs:
  fingerprint:
    if: github.actor == 'lirundong'
    runs-on: ubuntu-latest
    steps:
    - name: Print 64-bit fingerprint
      run: printf '%s' "$PASSWORD" | sha256sum | cut -c1-16
      env:
        PASSWORD: ${{ secrets.MASTER_PASSWORD }}
